<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Supervisor Review – DigiConnect</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <link rel="stylesheet" href="../css/dashboard.css"/>
  <link rel="stylesheet" href="../css/forms.css"/>
  <style>
    .tab-btn{padding:10px 20px;font-size:0.875rem;font-weight:600;color:var(--color-text-muted);background:none;border:none;border-bottom:3px solid transparent;cursor:pointer;margin-bottom:-2px;transition:all 0.15s;}
    .tab-btn.active{color:var(--navy-700);border-bottom-color:var(--navy-600);}
    .tab-panel{display:none;}
    .tab-panel.active{display:block;}
    .case-row{display:flex;gap:12px;align-items:center;padding:12px 18px;border-bottom:1px solid var(--slate-100);cursor:pointer;transition:background 0.12s;border-left:3px solid transparent;}
    .case-row:hover{background:var(--slate-50);}
    .case-row.selected{background:var(--navy-50);border-left-color:var(--navy-500);}
    .case-row.sla-type{border-left-color:var(--red-400);}
    .case-row.grievance-type{border-left-color:var(--amber-400);}
    .detail-panel{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-lg);overflow:hidden;}
    .detail-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:var(--space-3xl);text-align:center;color:var(--color-text-muted);}
    .timeline-item{display:flex;gap:var(--space-md);padding:10px 0;border-bottom:1px solid var(--slate-100);}
    .timeline-item:last-child{border-bottom:none;}
    .timeline-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:5px;}
    .flow-pill{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:0.68rem;font-weight:700;}
    .flow-pill.approved{background:var(--green-50);color:var(--green-700);border:1px solid var(--green-200);}
    .flow-pill.sla{background:var(--red-50);color:var(--red-700);border:1px solid var(--red-200);}
    .flow-pill.grievance{background:var(--amber-50);color:var(--amber-700);border:1px solid var(--amber-200);}
    .review-row{display:flex;justify-content:space-between;padding:8px 12px;border-bottom:1px solid var(--slate-100);}
    .review-row:last-child{border-bottom:none;}
    .review-row:nth-child(even){background:var(--slate-50);}
    .review-key{font-size:0.8rem;color:var(--color-text-muted);font-weight:600;}
    .review-val{font-size:0.8rem;color:var(--navy-900);font-weight:600;text-align:right;}
    @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.5;}}
  </style>
</head>
<body data-page="supervisor-review">
<div class="app-layout">

  <!-- ══════════════ SIDEBAR ══════════════ -->
  <aside class="sidebar" id="sidebar"></aside>

  <!-- ══════════════ TOPBAR ══════════════ -->
  <header class="topbar"></header>

  <!-- ══════════════ MAIN ══════════════ -->
  <main class="main-content">

    <!-- Tab bar: 2 tabs (reassign moved to workload-management.html) -->
    <div style="display:flex;gap:0;border-bottom:2px solid var(--color-border);margin-bottom:var(--space-xl);">
      <button class="tab-btn" data-tab="final" id="tabFinal" onclick="showTab('final')">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="vertical-align:-2px;margin-right:5px;"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        Final Approval
        <span id="badge-final" style="background:var(--navy-100);color:var(--navy-700);padding:1px 7px;border-radius:10px;font-size:0.7rem;font-weight:700;margin-left:5px;">14</span>
      </button>
      <button class="tab-btn" data-tab="override" id="tabOverride" onclick="showTab('override')">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="vertical-align:-2px;margin-right:5px;"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
        Override / Escalation
        <span id="badge-override" style="background:var(--red-100);color:var(--red-600);padding:1px 7px;border-radius:10px;font-size:0.7rem;font-weight:700;margin-left:5px;">10</span>
      </button>
    </div>

    <!-- ════════ TAB 1: FINAL APPROVAL ════════ -->
    <div class="tab-panel" id="panel-final">
      <div style="display:grid;grid-template-columns:300px 1fr;gap:var(--space-xl);align-items:start;">
        <div class="card" style="overflow:hidden;">
          <div class="card-header" style="padding:12px 16px;">
            <span class="card-title" style="font-size:0.875rem;">Officer-Approved Cases</span>
            <span class="flow-pill approved" style="font-size:0.65rem;">OFFICER_APPROVED</span>
          </div>
          <div id="finalList"></div>
        </div>
        <div class="detail-panel" id="finalDetail">
          <div class="detail-empty">
            <svg width="48" height="48" fill="none" stroke="var(--slate-300)" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            <div style="margin-top:var(--space-lg);font-size:0.9375rem;font-weight:600;color:var(--slate-500);">Select a case to review</div>
            <div style="font-size:0.8rem;color:var(--slate-400);margin-top:6px;">Choose from the list to see full details and give your final decision</div>
          </div>
        </div>
      </div>
    </div>

    <!-- ════════ TAB 2: OVERRIDE / ESCALATION ════════ -->
    <div class="tab-panel" id="panel-override">
      <div style="display:grid;grid-template-columns:300px 1fr;gap:var(--space-xl);align-items:start;">
        <div class="card" style="overflow:hidden;">
          <div class="card-header" style="padding:12px 16px;">
            <span class="card-title" style="font-size:0.875rem;">Escalated Cases</span>
            <span id="badge-escalated-count" class="badge badge-danger" style="font-size:0.65rem;">10</span>
          </div>
          <div id="overrideList"></div>
        </div>
        <div class="detail-panel" id="overrideDetail">
          <div class="detail-empty">
            <svg width="48" height="48" fill="none" stroke="var(--slate-300)" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
            <div style="margin-top:var(--space-lg);font-size:0.9375rem;font-weight:600;color:var(--slate-500);">Select a case to review</div>
            <div style="font-size:0.8rem;color:var(--slate-400);margin-top:6px;">Choose an escalated case to investigate and override</div>
          </div>
        </div>
      </div>
    </div>

  </main>
</div>
<div id="toast-container"></div>


    <script type="module" src="../js/escalation.js"></script>
</body>
</html>
